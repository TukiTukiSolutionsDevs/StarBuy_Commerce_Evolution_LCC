services:
  # ─── Next.js App ──────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SHOPIFY_STORE_DOMAIN: ${SHOPIFY_STORE_DOMAIN}
        SHOPIFY_STOREFRONT_ACCESS_TOKEN: ${SHOPIFY_STOREFRONT_ACCESS_TOKEN}
        SHOPIFY_STOREFRONT_PRIVATE_TOKEN: ${SHOPIFY_STOREFRONT_PRIVATE_TOKEN}
        SHOPIFY_API_VERSION: ${SHOPIFY_API_VERSION}
        SHOPIFY_CLIENT_ID: ${SHOPIFY_CLIENT_ID}
        SHOPIFY_CLIENT_SECRET: ${SHOPIFY_CLIENT_SECRET}
        ADMIN_CHAT_PASSWORD: ${ADMIN_CHAT_PASSWORD}
        NEXT_PUBLIC_SHOPIFY_STORE_DOMAIN: ${NEXT_PUBLIC_SHOPIFY_STORE_DOMAIN}
        NEXT_PUBLIC_SHOPIFY_API_VERSION: ${NEXT_PUBLIC_SHOPIFY_API_VERSION}
        NEXT_PUBLIC_SHOPIFY_STOREFRONT_TOKEN: ${NEXT_PUBLIC_SHOPIFY_STOREFRONT_TOKEN}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-https://starbuyevolucion.com}
    container_name: starbuy-app
    restart: unless-stopped
    env_file: .env.production
    expose:
      - "3000"
    volumes:
      # Persistent data — survives container restarts and redeploys
      - app-data:/app/data
    environment:
      # Tell the app to use /app/data for runtime file storage
      - STARBUY_DATA_DIR=/app/data
    networks:
      - starbuy-net
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:3000"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  # ─── Nginx Reverse Proxy ──────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: starbuy-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    depends_on:
      app:
        condition: service_healthy
    networks:
      - starbuy-net

  # ─── Certbot (SSL auto-renew) ────────────────────────────────
  certbot:
    image: certbot/certbot
    container_name: starbuy-certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

volumes:
  app-data:
    driver: local

networks:
  starbuy-net:
    driver: bridge
